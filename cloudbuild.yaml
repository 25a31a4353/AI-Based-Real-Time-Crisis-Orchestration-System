# Cloud Build CI/CD Pipeline for CrisisAI
# ==========================================
# Triggered on push to main branch.
# Builds Docker image, pushes to Artifact Registry, deploys to Cloud Run.
#
# One-time setup:
#   gcloud projects add-iam-policy-binding $PROJECT_ID \
#     --member="serviceAccount:$PROJECT_NUMBER@cloudbuild.gserviceaccount.com" \
#     --role="roles/run.admin"
#
# Then connect this repo in Cloud Build console.

substitutions:
  _SERVICE_NAME: crisis-ai-api
  _REGION: us-central1
  _REPO: crisis-ai

steps:
  # ── Step 1: Build Docker image ────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:$SHORT_SHA
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:latest
      - .

  # ── Step 2: Push to Artifact Registry ────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}

  # ── Step 3: Deploy to Cloud Run ───────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --concurrency=80
      - --port=8080
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=${_REGION}
      - --service-account=crisis-ai-sa@$PROJECT_ID.iam.gserviceaccount.com

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
